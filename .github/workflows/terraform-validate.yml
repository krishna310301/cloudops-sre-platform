name: Terraform Validate

on:
  pull_request:
    paths:
      - "infra/**"
      - "scripts/terraform_cost_guardrails.py"
      - ".github/workflows/terraform-validate.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - "scripts/terraform_cost_guardrails.py"
      - ".github/workflows/terraform-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  terraform:
    name: Format And Validate
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.7.5

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Cost And Security Guardrails
        working-directory: .
        run: python scripts/terraform_cost_guardrails.py

      - name: Checkov Terraform Security Scan
        working-directory: .
        run: |
          docker run --rm \
            -v "${PWD}:/workspace" \
            bridgecrew/checkov:3.2.403 \
            --directory /workspace/infra \
            --framework terraform \
            --compact \
            --soft-fail
