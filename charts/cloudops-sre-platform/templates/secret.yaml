{{- if and .Values.backend.database.createSecret .Values.backend.database.externalSecret.enabled }}
{{- fail "Set only one of backend.database.createSecret or backend.database.externalSecret.enabled" }}
{{- end }}
{{- if .Values.backend.database.createSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "cloudops-sre-platform.databaseSecretName" . }}
  labels:
    {{- include "cloudops-sre-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
type: Opaque
stringData:
  {{ .Values.backend.database.secretKey }}: {{ required "backend.database.databaseUrl is required when backend.database.createSecret=true" .Values.backend.database.databaseUrl | quote }}
{{- end }}
