apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudops-sre-platform.fullname" . }}-backend
  labels:
    {{- include "cloudops-sre-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  {{- if not .Values.backend.hpa.enabled }}
  replicas: {{ .Values.backend.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "cloudops-sre-platform.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: backend
  template:
    metadata:
      labels:
        {{- include "cloudops-sre-platform.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: backend
      {{- with .Values.backend.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "cloudops-sre-platform.backendServiceAccountName" . }}
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: APP_ENV
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cloudops-sre-platform.fullname" . }}-backend-config
                  key: APP_ENV
            - name: CORS_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cloudops-sre-platform.fullname" . }}-backend-config
                  key: CORS_ORIGINS
            - name: LOG_LEVEL
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cloudops-sre-platform.fullname" . }}-backend-config
                  key: LOG_LEVEL
            - name: LOG_FORMAT
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cloudops-sre-platform.fullname" . }}-backend-config
                  key: LOG_FORMAT
            - name: DEMO_MODE
              valueFrom:
                configMapKeyRef:
                  name: {{ include "cloudops-sre-platform.fullname" . }}-backend-config
                  key: DEMO_MODE
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "cloudops-sre-platform.databaseSecretName" . }}
                  key: {{ .Values.backend.database.secretKey }}
          readinessProbe:
            httpGet:
              path: {{ .Values.backend.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.failureThreshold }}
          livenessProbe:
            httpGet:
              path: {{ .Values.backend.probes.path }}
              port: http
            initialDelaySeconds: {{ .Values.backend.probes.initialDelaySeconds }}
            periodSeconds: {{ .Values.backend.probes.periodSeconds }}
            timeoutSeconds: {{ .Values.backend.probes.timeoutSeconds }}
            failureThreshold: {{ .Values.backend.probes.failureThreshold }}
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
