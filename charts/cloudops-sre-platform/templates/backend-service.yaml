apiVersion: v1
kind: Service
metadata:
  name: {{ include "cloudops-sre-platform.backendServiceName" . }}
  labels:
    {{- include "cloudops-sre-platform.labels" . | nindent 4 }}
    app.kubernetes.io/component: backend
spec:
  type: {{ .Values.backend.service.type }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
      protocol: TCP
  selector:
    {{- include "cloudops-sre-platform.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: backend
